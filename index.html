<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>崇明机房 - MEP 3D 查看器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; overflow:hidden; font-family:system-ui,sans-serif; }

#status {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(0,0,0,0.85); color:#ccc; padding:6px 12px;
  font-size:13px; display:flex; align-items:center; gap:10px;
}
#bar-wrap { flex:1; height:6px; background:#333; border-radius:3px; overflow:hidden; }
#bar { height:100%; width:0; background:#4fc3f7; transition:width .3s; }
#msg { white-space:nowrap; }

#panel {
  position:fixed; top:40px; left:8px; z-index:99;
  background:rgba(0,0,0,0.82); color:#ddd; border-radius:8px;
  padding:10px 14px; font-size:12px; min-width:145px;
  max-height:calc(100vh - 100px); overflow-y:auto;
}
#storey-info {
  font-size:11px; color:#aaa; margin-bottom:6px; padding-bottom:6px;
  border-bottom:1px solid #333;
}
#storey-info .tag {
  display:inline-block; background:#4fc3f7; color:#000; padding:1px 6px;
  border-radius:3px; font-size:10px; font-weight:600; margin-right:4px;
}
#storey-name { color:#ccc; font-size:11px; }
#panel h3 { font-size:12px; margin:8px 0 6px; color:#fff; border-bottom:1px solid #444; padding-bottom:4px; }
#legend-list { list-style:none; }
#legend-list li {
  padding:4px 0; cursor:pointer; display:flex; align-items:center; gap:6px;
  opacity:1; transition:opacity .2s; user-select:none; font-size:11px;
}
#legend-list li.off { opacity:0.3; text-decoration:line-through; }
#legend-list .dot { width:10px; height:10px; border-radius:50%; display:inline-block; flex-shrink:0; }
#legend-list .count { color:#888; font-size:10px; margin-left:auto; }

#tools {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%); z-index:99;
  display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
}
.tool-btn {
  background:rgba(0,0,0,0.75); color:#ddd; border:1px solid #555;
  padding:6px 12px; border-radius:5px; font-size:12px; cursor:pointer;
  white-space:nowrap; transition:all .15s;
}
.tool-btn:active { background:#4fc3f7; color:#000; border-color:#4fc3f7; }
.tool-btn.active { background:#4fc3f7; color:#000; border-color:#4fc3f7; }
.tool-btn.highlight { background:#e6261a; color:#fff; border-color:#e6261a; font-weight:bold; }

@media (hover:hover) {
  .tool-btn:hover { background:#555; }
  .tool-btn.highlight:hover { background:#ff3b2f; }
}
</style>
</head>
<body>

<div id="status">
  <span id="msg">加载中……</span>
  <div id="bar-wrap"><div id="bar"></div></div>
</div>

<div id="panel">
  <div id="storey-info"><span class="tag">标高</span><span id="storey-name"></span></div>
  <h3>构件图例</h3>
  <ul id="legend-list"></ul>
</div>

<div id="tools">
  <button class="tool-btn" id="btn-fit">适配</button>
  <button class="tool-btn" id="btn-wire">线框</button>
  <button class="tool-btn" id="btn-ghost">透明</button>
  <button class="tool-btn" id="btn-top">俯视</button>
  <button class="tool-btn" id="btn-front">正视</button>
  <button class="tool-btn" id="btn-auto">旋转</button>
  <button class="tool-btn" id="btn-full">全屏</button>
  <button class="tool-btn" id="btn-reset">重置</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "./three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './OrbitControls.js';
import { GLTFLoader } from './GLTFLoader.js';
import { MeshoptDecoder } from './meshopt_decoder.module.js';

const statusEl = document.getElementById('status');
const barEl = document.getElementById('bar');
const msgEl = document.getElementById('msg');
const legendList = document.getElementById('legend-list');
const storeyName = document.getElementById('storey-name');

function log(msg) {
  msgEl.textContent = msg;
  console.log('[Viewer]', msg);
}

log('初始化…');

// --- 颜色方案（与转换脚本 convert_chongming.py 一致）---
const typeColors = {
  '矩形风管': '#264dcc',
  '圆形风管': '#00a6b3',
  '风管':     '#3388d9',
  '管件':     '#4dbf66',
  '设备':     '#e64033',
  '墙体':     '#bfbfc7',
  '其他':     '#8c8c8c'
};
const legendOrder = ['设备', '矩形风管', '圆形风管', '管件', '墙体', '其他'];

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 500);
camera.position.set(30, 20, 30);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// --- Lights ---
scene.add(new THREE.AmbientLight(0x8899bb, 2));
const sun = new THREE.DirectionalLight(0xffffff, 4);
sun.position.set(40, 50, 30);
scene.add(sun);
const back = new THREE.DirectionalLight(0x8899cc, 1.5);
back.position.set(-20, 10, -20);
scene.add(back);

// --- OrbitControls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 2, 0);
controls.update();

// --- Grid ---
const grid = new THREE.GridHelper(60, 30, 0x334455, 0x1a1a2e);
grid.position.y = -0.01;
scene.add(grid);

// --- State ---
const categoryGroups = {};
const allMeshes = [];

// --- 从节点名匹配类型 ---
function detectCategory(name) {
  if (!name) return '其他';
  if (name.includes('矩形风管') || name.includes('矩形')) return '矩形风管';
  if (name.includes('圆形风管') || name.includes('圆')) return '圆形风管';
  if (name.includes('设备') || name.includes('新风机')) return '设备';
  if (name.includes('管件')) return '管件';
  if (name.includes('墙体') || name.includes('墙')) return '墙体';
  if (name.includes('风管')) return '风管';
  return '其他';
}

function buildLegend() {
  // 统计每个类型的 mesh 数量
  const catCount = {};
  for (const cat of legendOrder) {
    const g = categoryGroups[cat];
    if (g && g.length > 0) catCount[cat] = g.length;
  }

  legendList.innerHTML = '';
  for (const cat of legendOrder) {
    if (!catCount[cat]) continue;
    const color = typeColors[cat] || '#888';
    const li = document.createElement('li');
    li.innerHTML = '<span class="dot" style="background:' + color + '"></span>' +
      cat + '<span class="count">' + catCount[cat] + '</span>';
    li.dataset.cat = cat;
    li.onclick = function() {
      const off = li.classList.toggle('off');
      const meshes = categoryGroups[cat] || [];
      meshes.forEach(m => { m.visible = !off; });
    };
    legendList.appendChild(li);
  }
}

// --- Load model ---
log('加载模型…');
const loader = new GLTFLoader();
loader.setMeshoptDecoder(MeshoptDecoder);
loader.load(
  'model.glb',
  gltf => {
    barEl.style.width = '100%';
    log('渲染中…');

    // 标高信息（从 GLTF extras 读取）
    if (gltf.parser && gltf.parser.json && gltf.parser.json.extras) {
      const extras = gltf.parser.json.extras;
      if (extras.storeys) {
        storeyName.textContent = extras.storeys.map(s => s.name + ' ±' + s.elevation.toFixed(3) + 'm').join(' | ');
      }
    }

    // 遍历场景，按类型分组
    gltf.scene.traverse(node => {
      if (!node.isMesh) return;

      // 尝试从 mesh name 检测类型
      let cat = '其他';
      if (node.name) cat = detectCategory(node.name);

      // 回退：检查父节点名
      if (cat === '其他' && node.parent && node.parent.name) {
        cat = detectCategory(node.parent.name);
      }

      node.userData = node.userData || {};
      node.userData.category = cat;
      if (!categoryGroups[cat]) categoryGroups[cat] = [];
      categoryGroups[cat].push(node);
      allMeshes.push(node);

      // 应用颜色
      const colorHex = typeColors[cat] || typeColors['其他'];
      const applyMat = (mat) => {
        mat.color.set(colorHex);
        mat.roughness = 0.5;
        mat.metalness = 0.1;
      };
      if (node.material) {
        if (Array.isArray(node.material)) {
          node.material.forEach(applyMat);
        } else {
          applyMat(node.material);
        }
      }
    });

    scene.add(gltf.scene);
    buildLegend();

    // 设备高亮材质
    if (categoryGroups['设备']) {
      categoryGroups['设备'].forEach(m => {
        m.material = new THREE.MeshStandardMaterial({
          color: 0xe64033, roughness: 0.35, metalness: 0.2
        });
        m.renderOrder = 1;
      });
    }

    log('就绪 - ' + allMeshes.length + ' 个 mesh');
    statusEl.style.display = 'none';

    // 自动适配视角
    const box = new THREE.Box3().setFromObject(gltf.scene);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 1.5;
    controls.target.copy(center);
    camera.position.set(center.x + dist*0.7, center.y + dist*0.5, center.z + dist*0.7);
    camera.near = Math.max(maxDim * 0.01, 0.1);
    camera.far = maxDim * 10;
    camera.updateProjectionMatrix();
    controls.update();
  },
  xhr => {
    if (xhr.total) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      barEl.style.width = pct + '%';
      log('加载中 ' + pct + '%…');
    }
  },
  err => {
    log('加载失败: ' + (err.message || '未知错误'));
    barEl.style.background = '#ef5350';
    console.error('[Viewer]', err);
  }
);

// ===== 按钮功能 =====

// 适配
document.getElementById('btn-fit').onclick = () => {
  const box = new THREE.Box3().setFromObject(scene);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const dist = Math.max(size.x, size.y, size.z) * 1.5;
  controls.target.copy(center);
  camera.position.set(center.x + dist*0.6, center.y + dist*0.5, center.z + dist*0.6);
  controls.update();
};

// 线框
let wireframeOn = false;
document.getElementById('btn-wire').onclick = function() {
  wireframeOn = !wireframeOn;
  this.classList.toggle('active', wireframeOn);
  allMeshes.forEach(m => {
    const setWF = (mat) => { mat.wireframe = wireframeOn; };
    if (m.material) {
      if (Array.isArray(m.material)) m.material.forEach(setWF);
      else setWF(m.material);
    }
  });
};

// 透明切换
let ghostOn = false;
document.getElementById('btn-ghost').onclick = function() {
  ghostOn = !ghostOn;
  this.classList.toggle('active', ghostOn);
  allMeshes.forEach(m => {
    const setGhost = (mat) => {
      mat.transparent = ghostOn;
      mat.opacity = ghostOn ? 0.2 : 1.0;
      mat.depthWrite = !ghostOn;
      mat.needsUpdate = true;
    };
    if (m.material) {
      if (Array.isArray(m.material)) m.material.forEach(setGhost);
      else setGhost(m.material);
    }
    m.renderOrder = ghostOn ? 999 : (m.userData && m.userData.category === '设备' ? 1 : 0);
    if (m.userData && m.userData.category === '设备') {
      m.renderOrder = ghostOn ? 999 : 1;
    }
  });
};

// 俯视
document.getElementById('btn-top').onclick = () => {
  const box = new THREE.Box3().setFromObject(scene);
  const center = box.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  camera.position.set(center.x, center.y + 30, center.z);
  controls.update();
};

// 正视
document.getElementById('btn-front').onclick = () => {
  const box = new THREE.Box3().setFromObject(scene);
  const center = box.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  camera.position.set(center.x, center.y, center.z + 30);
  controls.update();
};

// 旋转
let autoRotate = false;
document.getElementById('btn-auto').onclick = function() {
  autoRotate = !autoRotate;
  this.classList.toggle('active', autoRotate);
  controls.autoRotate = autoRotate;
  controls.autoRotateSpeed = 1.5;
};

// 全屏
document.getElementById('btn-full').onclick = () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.body.requestFullscreen();
  }
};

// 重置
document.getElementById('btn-reset').onclick = () => {
  wireframeOn = false;
  ghostOn = false;
  document.getElementById('btn-wire').classList.remove('active');
  document.getElementById('btn-ghost').classList.remove('active');

  allMeshes.forEach(m => {
    m.visible = true;
    const resetMat = (mat) => {
      mat.wireframe = false;
      mat.transparent = false;
      mat.opacity = 1.0;
      mat.depthWrite = true;
      mat.needsUpdate = true;
    };
    if (m.material) {
      if (Array.isArray(m.material)) m.material.forEach(resetMat);
      else resetMat(m.material);
    }
  });

  legendList.querySelectorAll('li').forEach(li => li.classList.remove('off'));

  controls.target.set(0, 2, 0);
  camera.position.set(30, 20, 30);
  controls.update();
};

// ===== 响应式 =====
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ===== 渲染循环 =====
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

log('就绪');
</script>
</body>
</html>
